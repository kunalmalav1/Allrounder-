<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KINETIC ALCHEMIST</title>
<script>
  // GitHub Pages SPA redirect — sends all 404s back to index.html
  // preserving the path in a query param so the app can parse it.
  var path = window.location.pathname;
  var search = window.location.search;
  var hash = window.location.hash;
  window.location.replace(
    window.location.origin + '/?redirect=' +
    encodeURIComponent(path + search + hash)
  );
</script>
</head>
<body style="background:#0a0a08; color:#f5c518; font-family:monospace; display:flex; align-items:center; justify-content:center; height:100vh; margin:0;">
  <div style="text-align:center;">
    <div style="font-size:2rem; letter-spacing:0.2em; margin-bottom:1rem;">KINETIC ALCHEMIST</div>
    <div style="opacity:0.5; font-size:0.8rem; letter-spacing:0.15em;">REDIRECTING...</div>
  </div>
</body>
</html>
